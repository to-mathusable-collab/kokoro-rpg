  {text:'自分のことを一言で表すなら？',opts:[{t:'感情豊かで、人とのつながりを大切にしたい',ty:'anxious'},{t:'自分のペースがあって、穏やかにいたい',ty:'stable'},{t:'感情の波があって、自分でもよくわからない',ty:'anxious'},{t:'一人の時間が好きで、あまり人を信用しない',ty:'avoidant'}]}

    {text:'連絡・反応について、今どう感じていますか？',opts:[{t:'既読がつかないと頭から離れない',s:1},{t:'不安で確認したくなることがある',s:3},{t:'気になるけど待てることが増えた',s:5},{t:'相手のペースがあると思えるようになった',s:7}]},
    {text:'自分の気持ちについて、今どうですか？',opts:[{t:'嫌われないように我慢することが多い',s:1},{t:'本当は不安なのに強がってしまう',s:3},{t:'少しずつ本音を出せるようになってきた',s:5},{t:'自分の気持ちを素直に伝えられる',s:7}]},
    {text:'自分の人生について、今どう感じていますか？',opts:[{t:'相手のことで頭がいっぱいで他のことが手につかない',s:1},{t:'自分のことも大切にしたいとは思う',s:3},{t:'自分の人生を生きようと意識できている',s:5},{t:'一緒にいられたら嬉しい、でもいなくても生きていけると思う',s:7}]},
    {text:'今の毎日の生活（食事・睡眠・仕事）は？',opts:[{t:'ほとんど手につかない',s:1},{t:'なんとかこなしているが気力がない',s:3},{t:'意識して続けようとしている',s:5},{t:'ちゃんと守れている',s:7}]}
  ],

    {text:'人との距離感について、今どう感じていますか？',opts:[{t:'深い関係になると逃げたくなる',s:1},{t:'一人の方が楽だけど、さびしい気持ちもある',s:3},{t:'問題が起きても距離を取らずにいられることが増えた',s:5},{t:'誰かと一緒にいると安心することもある',s:7}]},
    {text:'気持ちを伝えることについて、今どうですか？',opts:[{t:'自分の気持ちを話すのが苦手でいつも飲み込む',s:1},{t:'本当はわかってほしい気持ちはある',s:3},{t:'少しずつ気持ちを言葉にできるようになってきた',s:5},{t:'自分の気持ちを話せる人がいる',s:7}]},

  ],
  stable:[
    {text:'気持ちを伝えることについて、今どうですか？',opts:[{t:'自分の気持ちをうまく言葉にできないことが多い',s:1},{t:'伝えたいけど、どう言えばいいか迷うことがある',s:3},{t:'少しずつ言葉にできるようになってきた',s:5},{t:'自分の気持ちを自然に伝えられる',s:7}]},
    {text:'相手との違いについて、今どう感じていますか？',opts:[{t:'相手が自分と違う意見だと不安になる',s:1},{t:'違っていいとは思うけど、うまく受け入れられない',s:3},{t:'少しずつ相手の違いを尊重できるようになった',s:5},{t:'相手の気持ちと自分の気持ちは違っていいと思える',s:7}]},

    {text:'関係を育てることについて、今どう感じていますか？',opts:[{t:'関係をどう育てればいいかわからない',s:1},{t:'一緒に成長したいとは思うけど難しい',s:3},{t:'少しずつ相手との時間を大切にできている',s:5},{t:'感謝を伝えながら、一緒に成長していきたいと思える',s:7}]}
  ]
};

var LV_NAMES=['始まりの村','迷いの森','揺れの海','理解の山','尊重の城','めざめの街','愛の草原'];
var LV_EMS=['🏘️','🌿','🌊','⛰️','🏰','🏙️','🌸'];
var LV_GRS=['linear-gradient(160deg,#FDE8EE,#F9C8D8)','linear-gradient(160deg,#DCF0E0,#A8D8B4)','linear-gradient(160deg,#D8E8FC,#A4C4F0)','linear-gradient(160deg,#F0E4D0,#DCC4A0)','linear-gradient(160deg,#FFF0C8,#F0D484)','linear-gradient(160deg,#EAD8F8,#C8A8E8)','linear-gradient(160deg,#FCE8F0,#F0B8D0)'];

function calcType(ans){var c={anxious:0,stable:0,avoidant:0};ans.forEach(function(t){if(c[t]!==undefined)c[t]++;});return Object.entries(c).sort(function(a,b){return b[1]-a[1];})[0][0];}
function calcLv(sc){var a=sc.reduce(function(x,y){return x+y;},0)/sc.length;if(a<1.7)return 1;if(a<2.8)return 2;if(a<4.1)return 3;if(a<5.1)return 4;if(a<5.9)return 5;if(a<6.5)return 6;return 7;}

var Ctx=createContext(null);

function Bar(props){
  var v=props.v;var col=props.col||C.pur;var bg=props.bg||'rgba(184,157,212,.15)';var ht=props.ht||8;
  return h('div',{style:{background:bg,borderRadius:100,height:ht,overflow:'hidden'}},
    h('div',{style:{background:col,width:Math.min(100,Math.max(0,v))+'%',height:'100%',borderRadius:100,transition:'width .8s ease'}}));
}

function Opening(){
  var ctx=useContext(Ctx);
  var nav=ctx.nav;
  return h('div',{className:'se',style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',background:'linear-gradient(160deg,#FDE8EE 0%,#EAD8F8 50%,#DCF0E0 100%)'}},
    h('div',{className:'fl',style:{fontSize:64,marginBottom:12,textAlign:'center'}},'💛'),
    h('div',{style:{fontFamily:"'Kaisei Opti',serif",fontSize:30,fontWeight:700,marginBottom:4,textAlign:'center',lineHeight:1.3}},'脱♡恋愛迷子'),
    h('div',{style:{fontSize:13,color:'rgba(61,51,71,.45)',marginBottom:20,textAlign:'center'}},'こころの地図 RPG'),
    h('div',{style:{width:'100%',background:'rgba(255,255,255,.6)',borderRadius:24,padding:'24px 20px',marginBottom:28,textAlign:'center'}},
      h('div',{style:{fontFamily:"'Kaisei Opti',serif",fontSize:18,fontWeight:700,color:C.txt,marginBottom:16,lineHeight:1.7}},'あなたは今、どこにいますか？'),
      h('div',{style:{fontSize:14,color:'rgba(61,51,71,.6)',lineHeight:2,marginBottom:16}},'この旅は\n「恋愛で迷いやすい心のパターン」を\n知るためのもの。'),
      h('div',{style:{fontSize:15,color:C.pur,fontWeight:700,lineHeight:2,marginBottom:16}},
        '答えを探す旅ではなく',h('br',null),
        h('span',{style:{fontSize:17,fontWeight:700,borderBottom:'2px solid '+C.pur,paddingBottom:2}},'"自分に戻るための地図"'),h('br',null),
        'を手に入れる旅です。'),
      h('div',{style:{fontSize:13,color:'rgba(61,51,71,.45)',lineHeight:2}},'正解はありません',h('br',null),'今のあなたに一番近いものを選んでください')),
    h('button',{onClick:function(){nav('diagnosis');},style:{width:'100%',borderRadius:100,padding:'16px',fontSize:16,fontWeight:700,background:'linear-gradient(135deg,#B89DD4,#89C4A0)',color:'#fff',border:'none',boxShadow:'0 4px 18px rgba(184,157,212,.4)',cursor:'pointer'}},'▶︎ 冒険をはじめる'));
}

function Diagnosis(){
  var ctx=useContext(Ctx);
  var setResult=ctx.setResult;var nav=ctx.nav;
  var s0=useState(0);var qi=s0[0];var setQi=s0[1];
  var s1=useState([]);var answers=s1[0];var setAnswers=s1[1];
  var s2=useState(function(){return TQ[0].opts.slice().sort(function(){return Math.random()-.5;});});
  var shuffled=s2[0];var setShuffled=s2[1];
  var q=TQ[qi];
  function pick(ty){
    var na=answers.concat(ty);
    if(qi<TQ.length-1){setAnswers(na);setQi(qi+1);setShuffled(TQ[qi+1].opts.slice().sort(function(){return Math.random()-.5;}));}
    else{var type=calcType(na);setResult(function(r){return Object.assign({},r,{userType:type});});nav('type_result');}
  }
  var pct=Math.round((qi/TQ.length)*100);
  return h('div',{className:'se',style:{minHeight:'100vh',paddingBottom:40}},
    h('div',{style:{background:'linear-gradient(160deg,#FDE8EE,#EAD8F8)',padding:'28px 20px 22px',borderRadius:'0 0 28px 28px',marginBottom:24}},
      h('div',{style:{fontSize:11,fontWeight:700,letterSpacing:'1.5px',color:'rgba(61,51,71,.4)',marginBottom:4,textTransform:'uppercase'}},'STEP 1 · タイプ診断'),
      h('div',{style:{fontFamily:"'Kaisei Opti',serif",fontSize:22,fontWeight:700,marginBottom:16}},'あなたのタイプは？'),
      h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:12,color:'rgba(61,51,71,.4)',marginBottom:8}},h('span',null,(qi+1)+' / '+TQ.length),h('span',null,pct+'%')),
      h(Bar,{v:pct,bg:'rgba(255,255,255,.35)',col:'rgba(255,255,255,.85)',ht:7})),
    h('div',{style:{padding:'0 16px'}},
      h('div',{className:'pp',key:qi,style:{background:'rgba(255,255,255,.97)',borderRadius:22,padding:'20px',boxShadow:C.sh,border:'1px solid '+C.bdr,marginBottom:18}},
        h('div',{style:{fontFamily:"'Kaisei Opti',serif",fontSize:17,fontWeight:700,lineHeight:1.65,color:C.txt}},q.text)),
      h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        shuffled.map(function(op,i){
          return h('button',{key:i,onClick:function(){pick(op.ty);},style:{background:'rgba(255,255,255,.97)',border:'1.5px solid '+C.bdr,borderRadius:16,padding:'13px 16px',textAlign:'left',fontSize:15,color:C.txt,fontWeight:500,lineHeight:1.55,cursor:'pointer',boxShadow:C.sh,display:'flex',alignItems:'center',gap:12},
            onMouseEnter:function(x){x.currentTarget.style.borderColor=C.pur;x.currentTarget.style.background=C.purXL;},
            onMouseLeave:function(x){x.currentTarget.style.borderColor=C.bdr;x.currentTarget.style.background='rgba(255,255,255,.97)';}},
            h('span',{style:{display:'inline-flex',width:26,height:26,borderRadius:'50%',background:'rgba(184,157,212,.12)',color:C.pur,fontWeight:700,fontSize:13,alignItems:'center',justifyContent:'center',flexShrink:0}},i+1),op.t);
        }))));
}

function TypeResult(){
  var ctx=useContext(Ctx);
  var result=ctx.result;var nav=ctx.nav;
  var tp=TYPES[result.userType]||TYPES.stable;

    h('div',{style:{background:tp.gr,padding:'40px 20px 28px',borderRadius:'0 0 36px 36px',textAlign:'center',marginBottom:24}},

      h('div',{style:{background:'rgba(255,255,255,.97)',borderRadius:22,padding:20,boxShadow:C.sh,border:'1px solid '+C.bdr,marginBottom:14}},
        h('div',{style:{fontSize:12,fontWeight:700,letterSpacing:'1.5px',color:C.txtM,textTransform:'uppercase',marginBottom:12}},'🎒 おすすめの装備'),

      h('div',{style:{background:'rgba(249,200,216,.13)',borderRadius:20,padding:'14px 16px',marginBottom:24,border:'1px solid rgba(249,200,216,.4)'}},
        h('div',{style:{fontSize:12,fontWeight:700,color:C.txtL,marginBottom:6}},'💡 アドバイス'),
        h('div',{style:{fontSize:14,color:C.txt,lineHeight:1.75}},tp.advice)),
      h('div',{style:{background:'linear-gradient(135deg,#F0EAFA,#EAF0F8)',borderRadius:22,padding:'20px',marginBottom:20,border:'1px solid '+C.bdrM,textAlign:'center'}},
        h('div',{style:{fontSize:13,color:C.pur,fontWeight:700,marginBottom:8}},'✨ 次のSTEP'),
        h('div',{style:{fontFamily:"'Kaisei Opti',serif",fontSize:18,fontWeight:700,marginBottom:8}},'今の現在地を確認しよう'),
        h('div',{style:{fontSize:13,color:C.txtL,lineHeight:1.7,marginBottom:16}},'5つの質問に答えるだけで\n今の旅のスタート地点がわかるよ。'),
        h('button',{onClick:function(){nav('check');},style:{width:'100%',borderRadius:100,padding:'16px',fontSize:16,fontWeight:700,background:C.pur,color:'#fff',border:'none',boxShadow:'0 4px 18px rgba(184,157,212,.4)',cursor:'pointer'}},'STEP 2 へ進む →'))));

function Check(){
