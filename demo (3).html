function calcType(answers){
  var c={hitoniku:0,kanpeki:0,jikohitei:0,yokuatsu:0,jibun:0};
  answers.forEach(function(ty){if(c[ty]!==undefined)c[ty]++;});
  if(c.jibun>=6)return 'jibun';
  var best='hitoniku';var bv=0;
  ['hitoniku','kanpeki','jikohitei','yokuatsu'].forEach(function(k){if(c[k]>bv){bv=c[k];best=k;}});
  return best;
}

function calcTypeFinal(answers){var c={hitoniku:0,kanpeki:0,jikohitei:0,yokuatsu:0,jibun:0};answers.forEach(function(ty){if(c[ty]!==undefined)c[ty]++;});if(c.jibun>=6)return 'jibun';var best='hitoniku';var bv=0;['hitoniku','kanpeki','jikohitei','yokuatsu'].forEach(function(k){if(c[k]>bv){bv=c[k];best=k;}});return best;}
function glv(n){return LV[Math.min(Math.max(n,1),7)-1];}
function byName(name){return IT.find(function(i){return i.name===name;})||IT[0];}
function xpProg(lv,xp){var f=XPR[lv-1]||0;var t=XPR[lv]||null;var c=xp-f;var nd=t?t-f:null;return{c:c,nd:nd,p:nd?Math.min(100,(c/nd)*100):100};}
function s2lv(sc){var a=sc.reduce(function(x,y){return x+y;},0)/sc.length;if(a<1.7)return 1;if(a<2.8)return 2;if(a<4.1)return 3;if(a<5.1)return 4;if(a<5.9)return 5;if(a<6.5)return 6;return 7;}

function reducer(s,a){
  if(a.t==='XP'){var nx=s.xp+a.v;var nl=s.level;while(nl<7&&nx>=XPR[nl])nl++;return Object.assign({},s,{xp:nx,level:nl});}
  if(a.t==='CHECK')return Object.assign({},s,a.p);
  if(a.t==='ACT')return Object.assign({},s,{actions:[a.a].concat(s.actions).slice(0,60)});
  if(a.t==='REF')return Object.assign({},s,{reflections:[a.r].concat(s.reflections).slice(0,30)});
  if(a.t==='EQ'){var eq=s.equippedItems.includes(a.id)?s.equippedItems.filter(function(x){return x!==a.id;}):[].concat(s.equippedItems,[a.id]);return Object.assign({},s,{equippedItems:eq});}
  if(a.t==='SET_TYPE')return Object.assign({},s,{userType:a.ty,level:1,xp:0,anxiety:70,selfAxis:30,energy:45});
  return s;
}

function App(){
  var stateArr=useReducer(reducer,null,INIT);
  var state=stateArr[0];var dispatch=stateArr[1];
  var screen=useState('welcome');var setScreen=screen[1];screen=screen[0];
  var hist=useState([]);var setHist=hist[1];hist=hist[0];
  /* デモ版はlocalStorage保存なし */
  function nav(to){setHist(hist.concat([screen]));setScreen(to);document.getElementById('root').scrollTop=0;}
  function goBack(){if(hist.length){var p=hist[hist.length-1];setHist(hist.slice(0,-1));setScreen(p);}else setScreen('welcome');document.getElementById('root').scrollTop=0;}
  var screens={
    welcome:Welcome,
    type_diagnosis:TypeDiagnosis,
    type_result:TypeResult,
    check:Check,
    level_result:LevelResult,
    premium:Premium,
    monsters:Monsters,
    characters:Characters
  };
  var Screen=screens[screen]||Welcome;
  return h(Ctx.Provider,{value:{state:state,dispatch:dispatch,nav:nav,goBack:goBack}},h(Screen,null));
}
ReactDOM.render(h(App,null),document.getElementById('root'));
