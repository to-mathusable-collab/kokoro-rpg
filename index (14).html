<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Kaisei+Opti:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Zen Maru Gothic',sans-serif;background:#FDF8FC;color:#3D3347}
textarea{outline:none;resize:none;font-family:'Zen Maru Gothic',sans-serif}
button{cursor:pointer;border:none;background:none;font-family:'Zen Maru Gothic',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(184,157,212,.3);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes pop{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.se{animation:fadeUp .35s ease-out both}
.fl{animation:floatY 3s ease-in-out infinite}
.pp{animation:pop .28s ease-out both}
@keyframes modalIn{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
</style>
